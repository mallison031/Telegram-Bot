services:
  - type: web
    name: signal-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Set this — it defaults to UTC, which shifts the morning/night texts
      - key: TIMEZONE
        sync: false
