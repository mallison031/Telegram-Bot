services:
  - type: web
    name: signal-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Set this — it defaults to UTC, which shifts the morning/night texts
      - key: TIMEZONE
        sync: false
      # Optional: enables forex monitoring (crypto and gold need no key).
      # `key` is the variable NAME; sync:false means Render prompts you for
      # the value. Never put the actual token in this file — it is committed.
      - key: TWELVEDATA_API_KEY
        sync: false
